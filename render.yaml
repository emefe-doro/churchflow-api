# Render deployment
services:
  - type: web
    name: churchflow-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./churchflow.db
      - key: SECRET_KEY
        generateValue: true
